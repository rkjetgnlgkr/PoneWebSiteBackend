server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pone_website?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Taipei
    username: root
    password: qwerty789
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.pone.website.entity
  configuration:
    map-underscore-to-camel-case: true
