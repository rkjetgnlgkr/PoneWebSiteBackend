server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/pone_website?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Taipei}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:qwerty789}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.pone.website.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 設定
jwt:
  secret: ${JWT_SECRET:pone-website-secret-key-2026-super-long-string-for-security}
  expiration: 86400000  # 24小時 (毫秒)

# 檔案上傳路徑
upload:
  path: ${UPLOAD_PATH:./uploads/}
  url-prefix: /api/files/
